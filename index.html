<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
margin:0;
background:#080808;
color:white;
font-family:Arial,Helvetica,sans-serif;
}

.hero{
position:relative;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:flex-start;
padding:105px 28px 40px 28px;
overflow:hidden;
background:#080808;
}

.hero-bg,
.hero-bg-next{
position:absolute;
inset:0;
background-size:cover;
background-position:center center;
background-repeat:no-repeat;
transition:opacity 1.6s ease;
z-index:0;
}

.hero-bg{opacity:1}
.hero-bg-next{opacity:0}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,.04),rgba(0,0,0,.23));
z-index:1;
}

.hero > *:not(.hero-bg):not(.hero-bg-next):not(.scroll){
position:relative;
z-index:2;
}

.brand{
letter-spacing:0;
font-size:30px;
font-weight:900;
margin-bottom:34px;
text-shadow:0 2px 12px rgba(0,0,0,.35);
white-space:nowrap;
}

.brand .wide{display:inline-block;width:16px}
.brand .tight{display:inline-block;width:8px}

.subtitle{
color:#fff;
text-transform:uppercase;
}

.line-one{
display:inline-block;
font-size:14px;
font-weight:800;
letter-spacing:6.4px;
margin-bottom:22px;
text-shadow:0 2px 12px rgba(0,0,0,.35);
white-space:nowrap;
}

.line-two{
letter-spacing:2.4px;
font-size:14px;
font-weight:800;
margin-bottom:2px;
text-shadow:0 2px 12px rgba(0,0,0,.35);
}

.line-three{
letter-spacing:1.4px;
font-size:14px;
font-weight:800;
white-space:nowrap;
margin-top:0;
text-shadow:0 2px 12px rgba(0,0,0,.35);
}

.scroll{
position:absolute;
left:28px;
bottom:120px;
z-index:5;
font-size:11px;
letter-spacing:4px;
color:#fff;
text-shadow:0 2px 12px rgba(0,0,0,.4);
}

.section{padding:52px 28px}

.small{
color:#aaa;
font-size:13px;
letter-spacing:3px;
text-transform:uppercase;
margin-bottom:18px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:14px;
margin-top:30px;
}

.card{
border:1px solid rgba(255,255,255,.22);
padding:22px;
text-decoration:none;
color:white;
letter-spacing:3px;
text-transform:uppercase;
font-size:13px;
transition:.25s;
}

.card:hover{

color:black;
}

.footer{
padding:40px 28px;
color:#777;
font-size:12px;
letter-spacing:2px;
}

@media(min-width:700px){

.brand{font-size:58px}
.brand .wide{width:28px}
.brand .tight{width:14px}

.line-one{
font-size:25.8px;
letter-spacing:12px;
}

.line-two{font-size:22px}

.line-three{
font-size:22px;
letter-spacing:2px;
}

.section{padding:72px 60px}

.grid{
grid-template-columns:1fr 1fr;
}

.hero{
padding:130px 60px 60px 60px;
}

.scroll{
left:60px;
bottom:120px;
}

}
</style>

<script>
const fallbackHero = "Hero.PNG";

const heroImages = [
"images/heroes/hero01.webp","images/heroes/hero02.webp","images/heroes/hero03.webp","images/heroes/hero04.webp",
"images/heroes/hero05.webp","images/heroes/hero06.webp","images/heroes/hero07.webp","images/heroes/hero08.webp",
"images/heroes/hero09.webp","images/heroes/hero10.webp","images/heroes/hero11.webp","images/heroes/hero12.webp",
"images/heroes/hero13.webp","images/heroes/hero14.webp","images/heroes/hero15.webp","images/heroes/hero16.webp",
"images/heroes/hero17.webp","images/heroes/hero18.webp","images/heroes/hero19.webp","images/heroes/hero20.webp",
"images/heroes/hero21.webp","images/heroes/hero22.webp","images/heroes/hero23.webp","images/heroes/hero24.webp",
"images/heroes/hero25.webp","images/heroes/hero26.webp","images/heroes/hero27.webp","images/heroes/hero28.webp"
];

const bgA = document.querySelector(".hero-bg");
const bgB = document.querySelector(".hero-bg-next");

let active = bgA;
let next = bgB;
let currentIndex = -1;
let availableImages = [];

function preloadImage(src){
return new Promise((resolve,reject)=>{
const img = new Image();
img.onload = () => resolve(src);
img.onerror = reject;
img.src = src;
});
}

async function findAvailableHeroes(){
const checks = heroImages.map(src =>
preloadImage(src).then(() => src).catch(() => null)
);

const results = await Promise.all(checks);
availableImages = results.filter(Boolean);

if(availableImages.length === 0){
availableImages = [fallbackHero];
}
}

function randomHero(){
if(availableImages.length === 1){
return availableImages[0];
}

let nextIndex;

do{
nextIndex = Math.floor(Math.random() * availableImages.length);
}while(nextIndex === currentIndex);

currentIndex = nextIndex;
return availableImages[currentIndex];
}

function setBackground(element, src){
element.style.backgroundImage = `url('${src}')`;
}

function switchHero(){
const src = randomHero();

setBackground(next, src);
next.style.opacity = 1;
active.style.opacity = 0;

const temp = active;
active = next;
next = temp;
}

async function initHero(){
setBackground(bgA, fallbackHero);
await findAvailableHeroes();
setBackground(bgA, randomHero());
setInterval(switchHero, 4000);
}

initHero();
</script>
